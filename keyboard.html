<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="keyboard.css">
</head>

<body>
  
  <div class="keyboard">
    <div class="row">
      <div class="key">
        <div class="letter">esc</div>
      </div>
      <div class="key">
        <div class="letter">F1</div>
      </div>
      <div class="key">
        <div class="letter">F2</div>
      </div>
      <div class="key">
        <div class="letter">F3</div>
      </div>
      <div class="key">
        <div class="letter">F4</div>
      </div>
      <div class="key">
        <div class="letter">F5</div>
      </div>
      <div class="key">
        <div class="letter">F6</div>
      </div>
      <div class="key">
        <div class="letter">F7</div>
      </div>
      <div class="key">
        <div class="letter">F8</div>
      </div>
      <div class="key">
        <div class="letter">F9</div>
      </div>
      <div class="key">
        <div class="letter">F10</div>
      </div>
      <div class="key">
        <div class="letter">F11</div>
      </div>
      <div class="key">
        <div class="letter">F12</div>
      </div>
      <div class="key print-sc">
        <div class="letter">prt scn</div>
      </div>
    </div>

    <div class="row">
      <div class="key">
        <div class="letter">`</div>
      </div>
      <div class="key">
        <div class="letter">1</div>
      </div>
      <div class="key">
        <div class="letter">2</div>
      </div>
      <div class="key">
        <div class="letter">3</div>
      </div>
      <div class="key">
        <div class="letter">4</div>
      </div>
      <div class="key">
        <div class="letter">5</div>
      </div>
      <div class="key">
        <div class="letter">6</div>
      </div>
      <div class="key">
        <div class="letter">7</div>
      </div>
      <div class="key">
        <div class="letter">8</div>
      </div>
      <div class="key">
        <div class="letter">9</div>
      </div>
      <div class="key">
        <div class="letter">0</div>
      </div>
      <div class="key">
        <div class="letter">-</div>
      </div>
      <div class="key">
        <div class="letter">=</div>
      </div>
      <div class="key delete-key">
        <div class="letter">← delete</div>
      </div>
    </div>

    <div class="row">
      <div class="key tab-key">
        <div class="letter ">tab ⮂</div>
      </div>
      <div class="key">
        <div class="letter">Q</div>
      </div>
      <div class="key">
        <div class="letter">W</div>
      </div>
      <div class="key">
        <div class="letter">E</div>
      </div>
      <div class="key">
        <div class="letter">R</div>
      </div>
      <div class="key">
        <div class="letter">T</div>
      </div>
      <div class="key">
        <div class="letter">Y</div>
      </div>
      <div class="key">
        <div class="letter">U</div>
      </div>
      <div class="key">
        <div class="letter">I</div>
      </div>
      <div class="key">
        <div class="letter">O</div>
      </div>
      <div class="key">
        <div class="letter">P</div>
      </div>
      <div class="key">
        <div class="letter">[</div>
      </div>
      <div class="key">
        <div class="letter">]</div>
      </div>
      <div class="key backslash-key">
        <div class="letter ">\</div>
      </div>
    </div>

    <div class="row">
      <div class="key caps-lock-key">
        <div class="letter ">caps lock</div>
      </div>
      <div class="key">
        <div class="letter">A</div>
      </div>
      <div class="key">
        <div class="letter">S</div>
      </div>
      <div class="key">
        <div class="letter">D</div>
      </div>
      <div class="key">
        <div class="letter">F</div>
      </div>
      <div class="key">
        <div class="letter">G</div>
      </div>
      <div class="key">
        <div class="letter">H</div>
      </div>
      <div class="key">
        <div class="letter">J</div>
      </div>
      <div class="key">
        <div class="letter">K</div>
      </div>
      <div class="key">
        <div class="letter">L</div>
      </div>
      <div class="key">
        <div class="letter">;</div>
      </div>
      <div class="key">
        <div class="letter">'</div>
      </div>
      <div class="key return-key">
        <div class="letter">↵ Enter</div>
      </div>
    </div>

    <div class="row">
      <div class="key shift-key">
        <div class="letter">⬆ Shift</div>
      </div>
      <div class="key">
        <div class="letter">Z</div>
      </div>
      <div class="key">
        <div class="letter">X</div>
      </div>
      <div class="key">
        <div class="letter">C</div>
      </div>
      <div class="key">
        <div class="letter">V</div>
      </div>
      <div class="key">
        <div class="letter">B</div>
      </div>
      <div class="key">
        <div class="letter">N</div>
      </div>
      <div class="key">
        <div class="letter">M</div>
      </div>
      <div class="key">
        <div class="letter">,</div>
      </div>
      <div class="key">
        <div class="letter">.</div>
      </div>
      <div class="key">
        <div class="letter">/</div>
      </div>
      <div class="key shift-key-2">
        <div class="letter ">⬆ shift</div>
      </div>
    </div>

    <div class="row">
      <div class="key">
        <div class="letter">Ctrl</div>
      </div>
      <div class="key">
        <div class="letter ctrl-key">fn</div>
      </div>
      <div class="key">
        <div class="letter alt-key">⌥</div>
      </div>
      <div class="key">
        <div class="letter command-key">⌘</div>
      </div>
      <div class="key spacekey">
        <div class="letter ">space</div>
      </div>
      <div class="key">
        <div class="letter command-key">⌘</div>
      </div>
      <div class="key">
        <div class="letter alt-key">⌥</div>
      </div>
      <div class="key">
        <div class="letter arrow-key">◀</div>
      </div>
      <div class="key">
        <div class="letter arrow-key">▼</div>
      </div>
      <div class="key">
        <div class="letter arrow-key">▲</div>
      </div>
      <div class="key">
        <div class="letter arrow-key">▶</div>
      </div>
    </div>
  </div>
</body>
</html>
